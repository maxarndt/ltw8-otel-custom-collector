apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-collector
  namespace: observability
  labels:
    app: custom-collector
spec:
  # 1 replica only — KNX Tunnel allows one connection at a time.
  # Router mode supports multiple listeners, but single replica avoids duplicate metrics.
  replicas: 1
  selector:
    matchLabels:
      app: custom-collector
  template:
    metadata:
      labels:
        app: custom-collector
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: custom-collector
          image: ghcr.io/maxarndt/ltw8-otel-custom-collector:latest
          imagePullPolicy: Always
          args:
            - --config=/etc/otelcol/collector-config.yaml
          ports:
            - name: health
              containerPort: 13133
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: custom-collector-config
      # NOTE: For KNX router (multicast) mode the pod needs to receive multicast traffic
      # from the MDT IP Router. Options:
      #   1. hostNetwork: true  — pod joins the host network, receives multicast directly
      #   2. CNI with IGMP snooping support (Calico, Cilium with multicast enabled)
      # Uncomment if multicast does not reach the pod:
      # hostNetwork: true
      restartPolicy: Always
