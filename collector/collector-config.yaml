extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  knx:
    connection:
      # Router-Modus (Default — kein Verbindungsslot am MDT IP Router belegt)
      type: "router"
      multicast_address: "224.0.23.12:3671"
      # Tunnel-Modus (Alternative, falls kein Multicast verfügbar):
      # type: "tunnel"
      # endpoint: "192.168.1.10:3671"
    read_startup_interval: 200ms
    address_configs:
      "1/1/1":
        name: "strom_eg_kueche_wh"
        dpt: "13.010"
        export: true
        metric_type: "sum"
        read_startup: true
        labels:
          room: "kueche"
          floor: "eg"
      "1/1/2":
        name: "leistung_eg_kueche_w"
        dpt: "14.056"
        export: true
        metric_type: "gauge"
        read_startup: true
        labels:
          room: "kueche"
          floor: "eg"

  syr:
    endpoint: "http://10.8.10.170:5333"
    collection_interval: 2m
    timeout: 10s
    metrics:
      FLO:
        enabled: false
      IWH:
        enabled: false
      OWH:
        enabled: false
      VOL:
        enabled: true
      RE1:
        enabled: true
      SS1:
        enabled: true
      SV1:
        enabled: true
      ALA:
        enabled: true
      RG1:
        enabled: true

  fronius:
    endpoint: "http://10.8.10.19"
    collection_interval: 60s
    timeout: 10s
    metrics:
      power_flow: true
      inverter_realtime: true
      meter_realtime: true
      storage_realtime: true
      inverter_info: true
      ohmpilot_realtime: false

exporters:
  prometheusremotewrite:
    endpoint: "http://victoriametrics.observability.svc.cluster.local:8428/api/v1/write"
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    metrics:
      # receivers: [knx, syr, fronius]
      receivers: [fronius]
      exporters: [prometheusremotewrite]
      # exporters: [debug, prometheusremotewrite]
