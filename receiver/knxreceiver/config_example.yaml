knx:
  connection:
    # Router-Modus (empfohlen für rein-lesende Receiver — kein Verbindungsslot belegt)
    type: "router"
    multicast_address: "224.0.23.12:3671"
    # Tunnel-Modus (Alternative bei fehlendem Multicast, z.B. VPN oder getrenntes L2):
    # type: "tunnel"
    # endpoint: "192.168.1.10:3671"

  # Wartezeit zwischen GroupValueRead-Anfragen beim Start (Bus-Last-Begrenzung)
  read_startup_interval: 200ms

  address_configs:
    # --- Phase 1: Energie & Leistung (MDT AMS Aktoren) ---

    # DPT 13.010 — Energie in Wh (aufsummiert pro Kanal) → OTEL Sum (monoton, kumulativ)
    "1/1/1":
      name: "strom_eg_kueche_wh"
      dpt: "13.010"
      export: true
      metric_type: "sum"
      read_startup: true        # Initialwert beim Start lesen
      labels:
        room: "kueche"
        floor: "eg"

    # DPT 14.056 — Wirkleistung in Watt → OTEL Gauge
    "1/1/2":
      name: "leistung_eg_kueche_w"
      dpt: "14.056"
      export: true
      metric_type: "gauge"
      read_startup: true
      labels:
        room: "kueche"
        floor: "eg"

    # --- Phase 2: Weitere Typen ---

    # DPT 9.001 — Temperatur in °C → OTEL Gauge
    "2/1/1":
      name: "temperatur_wohnzimmer_c"
      dpt: "9.001"
      export: true
      metric_type: "gauge"
      read_startup: true
      labels:
        room: "wohnzimmer"
        floor: "eg"

    # DPT 9.004 — Beleuchtungsstärke in Lux → OTEL Gauge
    "2/1/2":
      name: "helligkeit_wohnzimmer_lux"
      dpt: "9.004"
      export: true
      metric_type: "gauge"
      read_startup: false
      labels:
        room: "wohnzimmer"

    # DPT 9.007 — Relative Luftfeuchte in % → OTEL Gauge
    "2/1/3":
      name: "luftfeuchte_wohnzimmer_pct"
      dpt: "9.007"
      export: true
      metric_type: "gauge"
      read_startup: true
      labels:
        room: "wohnzimmer"

    # DPT 1.001 — Binär An/Aus → OTEL Gauge (0.0 = Aus, 1.0 = An)
    "3/1/1":
      name: "licht_kueche_an"
      dpt: "1.001"
      export: true
      metric_type: "gauge"
      read_startup: true
      labels:
        room: "kueche"

    # DPT 5.001 — Prozentwert 0–100% → OTEL Gauge
    "3/1/2":
      name: "jalousie_wohnzimmer_pct"
      dpt: "5.001"
      export: true
      metric_type: "gauge"
      read_startup: false
      labels:
        room: "wohnzimmer"

    # DPT 5.010 — Ganzzahl 0–255 → OTEL Gauge
    "3/1/3":
      name: "szene_wohnzimmer"
      dpt: "5.010"
      export: true
      metric_type: "gauge"
      read_startup: false
      labels:
        room: "wohnzimmer"
